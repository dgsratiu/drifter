<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Drifter - Login</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background: #0d1117;
           color: #c9d1d9; display: flex; justify-content: center; align-items: center;
           min-height: 100vh; }
    .login { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
             padding: 2rem; width: 300px; }
    h1 { font-size: 1.3rem; margin-bottom: 1rem; text-align: center; }
    input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
            padding: 0.5rem; border-radius: 4px; font-size: 1rem; margin-bottom: 0.75rem;
            box-sizing: border-box; }
    button { width: 100%; background: #58a6ff; color: #fff; border: none; padding: 0.6rem;
             border-radius: 4px; cursor: pointer; font-size: 1rem; }
    .error { color: #f85149; font-size: 0.85rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="login">
    <h1>Drifter</h1>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <input type="password" name="password" placeholder="Password" autofocus>
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
