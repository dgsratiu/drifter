<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Drifter{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.3.0/sse.js"></script>
  <style>
    :root { --bg: #0d1117; --fg: #c9d1d9; --dim: #8b949e; --accent: #58a6ff;
            --green: #3fb950; --red: #f85149; --border: #30363d; --card: #161b22; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg);
           color: var(--fg); line-height: 1.5; padding: 1rem; max-width: 900px; margin: 0 auto; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { display: flex; gap: 1rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border);
          margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    nav .brand { font-weight: bold; font-size: 1.1rem; }
    nav .spacer { flex: 1; }
    h1 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.1rem; margin: 1rem 0 0.5rem; color: var(--dim); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px;
            padding: 0.75rem; margin-bottom: 0.5rem; }
    .badge { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 12px;
             font-size: 0.75rem; font-weight: 600; }
    .badge-healthy { background: #0d2818; color: var(--green); }
    .badge-dead { background: #2d1117; color: var(--red); }
    .badge-paused, .badge-blocked { background: #1c1d21; color: #d29922; }
    .badge-pending { background: #1c1d21; color: #d29922; }
    .badge-approved { background: #0d2818; color: var(--green); }
    .badge-rejected { background: #2d1117; color: var(--red); }
    .badge-provisioning { background: #0d1d30; color: var(--accent); }
    .msg { padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
    .msg:last-child { border-bottom: none; }
    .msg-meta { font-size: 0.8rem; color: var(--dim); }
    .msg-agent { color: var(--accent); font-weight: 600; }
    .msg-content { white-space: pre-wrap; word-break: break-word; }
    form { display: flex; flex-direction: column; gap: 0.5rem; }
    input, textarea, select { background: var(--card); border: 1px solid var(--border);
           color: var(--fg); padding: 0.5rem; border-radius: 4px; font-size: 0.9rem; }
    textarea { min-height: 3rem; resize: vertical; }
    button, .btn { background: var(--accent); color: #fff; border: none; padding: 0.5rem 1rem;
            border-radius: 4px; cursor: pointer; font-size: 0.9rem; display: inline-block; }
    button:hover, .btn:hover { opacity: 0.9; }
    .btn-danger { background: var(--red); }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
    .success { color: var(--green); }
    .error { color: var(--red); }
    .dim { color: var(--dim); font-size: 0.85rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 0.5rem; }
    .flex { display: flex; gap: 0.5rem; align-items: center; }
    .flex-wrap { flex-wrap: wrap; }
    .mt { margin-top: 1rem; }
    #sse-messages .msg { animation: fadein 0.3s; }
    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <nav>
    <span class="brand">Drifter</span>
    <a href="/">Overview</a>
    <a href="/agents">Agents</a>
    <a href="/proposals">Proposals</a>
    <span class="spacer"></span>
    <a href="/logout">Logout</a>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
