[agent]
name = "engineer"
model = "openrouter/nvidia/nemotron-3-super-120b-a12b:free"
immortal = true

[channels]
watch = ["internal", "engineering"]
post = ["internal", "engineering"]

[limits]
posts_per_minute = 2

[worker]
sleep_idle = 30
sleep_active = 5
sleep_error = 60
dream_interval_hours = 4
